<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="header" class="navbar-custom d-flex justify-content-center align-items-center">
    <nav class="container d-flex justify-content-between align-items-center text-white">

        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <h1 class="fs-3 fw-semibold text-white mb-0">
                Money Tracker
                <i class="bi bi-piggy-bank-fill ms-2"></i>
            </h1>
        </a>

        <div class="d-flex ps-4" sec:authorize="isAuthenticated()">
            <ul class="d-flex list-unstyled m-0 p-0 align-items-center gap-5">
                <li>
                    <a class="nav-link-item fw-semibold text-decoration-none py-1" th:href="@{/overview}">Visão
                        Geral</a>
                </li>
                <li>
                    <a class="nav-link-item fw-semibold text-decoration-none py-1"
                       th:href="@{/transactions}">Movimentações</a>
                </li>
                <li>
                    <a class="nav-link-item fw-semibold text-decoration-none py-1" th:href="@{/goals}">Metas</a>
                </li>
            </ul>
        </div>

        <div sec:authorize="isAnonymous()">
            <ul class="d-flex list-unstyled m-0 p-0 align-items-center gap-4">
                <li>
                    <a class="nav-link-item fw-semibold text-decoration-none py-1" th:href="@{/auth/login}">Login</a>
                </li>
                <li>
                    <a class="nav-link-item nav-link-button fw-semibold text-decoration-none border border-2 border-white py-2 px-3 rounded-2"
                       th:href="@{/user/create}">Cadastrar-se</a>
                </li>
            </ul>
        </div>

        <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
            <i class="bi bi-person-circle fs-3 pe-2"></i>
            <div class="dropdown">
                <a class="nav-link dropdown-toggle fw-semibold" href="#" role="button" aria-expanded="false"
                   th:text="'Olá, ' +  ${#authentication.principal.name}">
                </a>
                <ul class="dropdown-menu user-menu">
                    <li><a class="dropdown-item fs-6" th:href="@{/user/update}">Perfil e Dados</a></li>
                    <li><a class="dropdown-item fs-6" th:href="@{/user/change-password}">Alterar Senha</a></li>
                    <li>
                        <form method="post" th:action="@{/logout}" class="m-0">
                            <button type="submit" class="dropdown-item fs-6">
                                Sair
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>

</body>
</html>
