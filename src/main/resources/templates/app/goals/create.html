<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(titulo='Money Tracker | Nova Meta')}">
</head>

<body class="d-flex flex-column min-vh-100">
<header th:replace="~{fragments/header :: header}">
</header>

<main class="flex-grow-1 hero-section d-flex align-items-center justify-content-center">

    <form method="post" th:action="@{/goals/create}" th:object="${createGoalForm}"  class="bg-white rounded-3 shadow" style="width: 50%; padding: 50px;">

        <h5 class="pb-4 fw-semibold">Nova Meta</h5>

        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}"></span>
        </div>

        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
            <strong class="pb-1">Por favor, corrija os erros abaixo:</strong>
            <ul>
                <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
            </ul>
        </div>

        <div class="row mb-4">

            <div class="col-lg-12 mb-3">
                <label for="categoryId" class="form-label">Categoria</label>
                <select class="form-select" id="categoryId" th:field="*{categoryId}">
                    <option th:value="null" selected disabled>Selecione...</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.categoryName}">
                    </option>
                </select>
            </div>

            <div class="col-lg-12 mb-3">
                <label for="maxExpense" class="form-label">Despesa Máxima Esperada</label>
                <input type="number" class="form-control" id="maxExpense" placeholder="Ex: 5000.00"
                       step="0.01" min="0.01" th:field="*{maxExpense}">
            </div>

            <div class="col-lg-12 mb-3">
                <label for="startDate" class="form-label">Início da Meta</label>
                <input type="month" class="form-control" id="startDate" th:field="*{startDate}">
            </div>
        </div>

        <div class="d-flex justify-content-end gap-2">
            <a th:href="@{/goals}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary action-btn">Salvar Meta</button>
        </div>
    </form>
</main>

<footer th:replace="~{fragments/footer :: footer}">
</footer>

</body>
</html>
