<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(titulo='Money Tracker | Editar Meta')}">
</head>

<body class="d-flex flex-column min-vh-100">
<header th:replace="~{fragments/header :: header}">
</header>

<main class="flex-grow-1 hero-section d-flex align-items-center justify-content-center">

  <form method="post" th:action="@{/goals/update}" th:object="${updateGoalForm}"
        class="bg-white rounded-3 shadow" style="width: 50%; padding: 50px;">

    <h5 class="pb-4 fw-semibold">Editar Meta</h5>

    <input type="hidden" th:field="*{id}">

    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
      <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
      <strong class="pb-1">Por favor, corrija os erros abaixo:</strong>
      <ul>
        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
      </ul>
    </div>

    <div class="row mb-4">

      <div class="col-lg-12 mb-3">
        <label for="categoryName" class="form-label">Categoria</label>
        <input type="text" class="form-control" id="categoryName"
               th:value="*{categoryName}"
               readonly disabled
               style="background-color: #e9ecef;"> <div class="form-text">A categoria não pode ser alterada.</div>
      </div>

      <div class="col-lg-12 mb-3">
        <label for="maxExpense" class="form-label">Despesa Máxima Esperada</label>
        <input type="number" class="form-control" id="maxExpense" placeholder="Ex: 5000.00"
               step="0.01" min="0.01" th:field="*{maxExpense}">
      </div>

      <div class="col-lg-12 mb-3">
        <label for="startDate" class="form-label">Início da Meta</label>
        <input type="month" class="form-control" id="startDate" th:field="*{startDate}" readonly disabled>
        <div class="form-text">O mês de referência não pode ser alterado.</div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-2">
      <a th:href="@{/goals}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary action-btn">Salvar Alterações</button>
    </div>
  </form>
</main>

<footer th:replace="~{fragments/footer :: footer}">
</footer>

</body>
</html>
