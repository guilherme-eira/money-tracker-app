<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(titulo='Money Tracker | Nova Transação')}">
</head>

<body class="d-flex flex-column min-vh-100">
<header th:replace="~{fragments/header :: header}">
</header>

<main class="flex-grow-1 hero-section d-flex align-items-center justify-content-center">

  <form method="post" th:action="@{/transactions/create}" th:object="${createTransactionForm}"  class="bg-white rounded-3 shadow" style="width: 50%; padding: 50px;">

    <h5 class="pb-4 fw-semibold">Nova Transação</h5>

    <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
      <span th:text="${errorMessage}"></span>
    </div>

    <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger" role="alert">
      <strong class="pb-1">Por favor, corrija os erros abaixo:</strong>
      <ul>
        <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
      </ul>
    </div>

    <div class="row mb-4">

      <div class="col-lg-12 mb-3">
        <label for="description" class="form-label">Descrição</label>
        <textarea class="form-control" id="description" placeholder="Ex: Almoço Restaurante X"
                  th:field="*{description}"></textarea>
      </div>

      <div class="col-lg-12 mb-3">
        <label for="categoryId" class="form-label">Categoria</label>
        <select class="form-select" id="categoryId" th:field="*{categoryId}">
          <option th:value="null" selected disabled>Selecione...</option>
          <option th:each="cat : ${allCategories}"
                  th:value="${cat.id}"
                  th:text="|${cat.categoryName} (${cat.type.name() == 'INCOME' ? 'Receita' : 'Despesa'})|"
          </option>
        </select>
      </div>

      <div class="col-lg-6 mb-3">
        <label for="value" class="form-label">Valor</label>
        <input type="number" class="form-control" id="value" placeholder="Ex: 50.00" step="0.01" min="0.01" th:field="*{value}">
      </div>

      <div class="col-lg-6 mb-3">
        <label for="date" class="form-label">Data</label>
        <input type="date" class="form-control" id="date" th:field="*{date}">
      </div>

    </div>

    <div class="d-flex justify-content-end gap-2">
      <a th:href="@{/transactions}" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary action-btn">Salvar Transação</button>
    </div>
  </form>

</main>

<footer th:replace="~{fragments/footer :: footer}">
</footer>

</body>
</html>
