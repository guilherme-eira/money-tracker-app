<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head(titulo='Money Tracker | Erro')}">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">
<header th:replace="~{fragments/header :: header}">
</header>

<main class="flex-grow-1 container d-flex align-items-center justify-content-center">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8" style="width: 600px;">
            <div class="card shadow-sm border-0 text-center">
                <div class="card-body p-5">

                    <i class="bi bi-exclamation-triangle-fill display-1 text-danger mb-3"></i>

                    <h2 class="h3 fw-bold" style="color: var(--text-dark);">
                        Oops! Algo deu errado.
                    </h2>

                    <p class="text-muted fs-5 mt-3"
                       th:text="${message} ?: 'Não foi possível completar sua solicitação.'">
                        Não foi possível completar sua solicitação.
                    </p>

                    <p class="text-muted">
                        Por favor, tente novamente mais tarde.
                    </p>

                    <a th:href="@{/}" class="btn btn-primary action-btn btn-lg mt-4">
                        <i class="bi bi-house-door-fill me-2"></i>
                        Voltar ao Início
                    </a>

                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}">
</footer>

</body>
</html>
